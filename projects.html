<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />

    <!-- https://stackoverflow.com/questions/37287153/how-to-get-images-in-bootstraps-card-to-be-the-same-height-width -->
    <!-- https://stackoverflow.com/questions/35868756/how-to-make-bootstrap-4-cards-the-same-height-in-card-columns -->
    <style>
      .embed-responsive .card-img-top {
        object-fit: cover;
        object-position: left;
      }
    </style>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <title>Tom White's Projects</title>
  </head>

  <body>
    <h1 class="text-center">Tom White's Projects</h1>

    <p class="text-center">
      Some of my projects (more on
      <a
        href="https://github.com/search?o=desc&q=user%3Atomwhite&s=updated&type=Repositories"
        >GitHub</a
      >).
    </p>

    <div id="topic-buttons" class="mb-3 text-center"></div>
    <p id="result-count" class="text-center text-muted"></p>
    <div class="container" id="projects"></div>

    <script>
      d3.csv("data/projects-db.csv").then(function(data) {
          if (data.length === 0) return;

          // Only show published projects
          var projects = data.filter(d => d.published === "Y");

          // In reverse chronological order
          projects = d3.sort(projects, (a, b) => d3.descending(a.date, b.date));

          let activeTopic = null;

          // Extract unique topics and render filter buttons
          const topics = Array.from(new Set(projects.flatMap(d => d.topics ? d.topics.split(",").map(t => t.trim()) : []))).sort();
          const topicButtons = d3.select("#topic-buttons");
          topicButtons.selectAll("button")
              .data(topics)
              .enter()
              .append("button")
              .attr("class", "btn btn-outline-primary mr-2")
              .text(d => d)
              .on("click", function(event, topic) {
                  if (activeTopic === topic) {
                      activeTopic = null;
                      topicButtons.selectAll("button").classed("btn-primary", false).classed("btn-outline-primary", true);
                  } else {
                      activeTopic = topic;
                      topicButtons.selectAll("button").classed("btn-primary", false).classed("btn-outline-primary", true);
                      d3.select(this).classed("btn-outline-primary", false).classed("btn-primary", true);
                  }
                  renderProjects();
              });

          function renderProjects() {
              const filtered = activeTopic
                  ? projects.filter(d => d.topics && d.topics.split(",").map(t => t.trim()).includes(activeTopic))
                  : projects;

              const countEl = document.getElementById("result-count");
              if (activeTopic) {
                  countEl.textContent = `Showing ${filtered.length} of ${projects.length} projects`;
              } else {
                  countEl.textContent = `${projects.length} projects`;
              }

              var html = "";
              for (var i = 0; i < filtered.length; i++) {
                if (i % 4 == 0) {
                  html += '<div class="row mb-4">\n';
                }
                var project = filtered[i];
                var logo_url = project.logo_url ? project.logo_url : `https://raw.githubusercontent.com/tomwhite/${project.name}/master/logo.png`
                html += [
                  '<div class="col-sm-3">',
                  '  <div class="card h-100">',
                  '    <div class="embed-responsive embed-responsive-1by1">',
                  '      <a href="' +
                    project.homepage +
                    '"><img class="card-img-top embed-responsive-item" src="' +
                    logo_url +
                    '" alt="' +
                    project.name +
                    ' logo" onerror="this.closest(\'.embed-responsive\').style.display=\'none\'"></a>',
                  "    </div>",
                  '    <div class="card-body">',
                  '      <a href="' +
                    project.homepage +
                    '"><h5 class="card-title">' +
                    project.name +
                    "</h5></a>",
                  '      <p class="card-text">' + project.description + "</p>",
                  '      <a href="' +
                    project.homepage +
                    '" class="card-link">More...</a>',
                  '      <a href="' +
                    project.html_url +
                    '" class="card-link">Code</a>',
                  "    </div>",
                  "  </div>",
                  "</div>",
                  "",
                ].join("\n");

                if (i % 4 == 3) {
                  html += "</div>\n";
                }
              }

              if (filtered.length % 4 != 0) {
                html += "</div>\n";
              }

              document.getElementById("projects").innerHTML = html;
          }

          renderProjects();
      }).catch(error => console.error("Error loading CSV:", error));
    </script>

  </body>
</html>
