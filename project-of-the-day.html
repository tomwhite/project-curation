<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Project of the Day</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
    <style>
      .embed-responsive .card-img-top {
        object-fit: cover;
        object-position: left;
      }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body class="container mt-4">
    <h2 class="mb-4">Project of the Day</h2>
    <div id="project"></div>
    <script>
        // Get Julian Day Number from https://stackoverflow.com/a/69772888
        function jdFromDate(dateTime) {
            return (
                Date.UTC(
                    dateTime.getFullYear(),
                    dateTime.getMonth(),
                    dateTime.getDate()
                ) /
                    86400000 +
                2440588
            );
        }

        // Hash function from https://stackoverflow.com/a/47593316
        function cyrb128(str) {
            let h1 = 1779033703, h2 = 3144134277,
                h3 = 1013904242, h4 = 2773480762;
            for (let i = 0, k; i < str.length; i++) {
                k = str.charCodeAt(i);
                h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
                h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
                h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
                h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
            }
            h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
            h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
            h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
            h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
            h1 ^= (h2 ^ h3 ^ h4), h2 ^= h1, h3 ^= h1, h4 ^= h1;
            return [h1>>>0, h2>>>0, h3>>>0, h4>>>0];
        }

        d3.csv("data/projects-db.csv").then(function(rawData) {
            const data = rawData;
            if (data.length === 0) return;
            const data_mixed = data.map(d => ({...d, id: cyrb128(d.name)[0]}));
            data_mixed.sort((a, b) => a.id - b.id);
            const dayIndex = jdFromDate(new Date()) % data_mixed.length;
            const d = data_mixed[dayIndex];

            const logo_url = d.logo_url ? d.logo_url : `https://raw.githubusercontent.com/tomwhite/${d.name}/master/logo.png`;

            // Build DOM safely to avoid XSS via CSV fields
            const row = document.createElement("div");
            row.className = "row";
            const col = row.appendChild(document.createElement("div"));
            col.className = "col-sm-3";
            const card = col.appendChild(document.createElement("div"));
            card.className = "card h-100";

            const embed = card.appendChild(document.createElement("div"));
            embed.className = "embed-responsive embed-responsive-1by1";
            const imgLink = embed.appendChild(document.createElement("a"));
            imgLink.href = d.homepage;
            const img = imgLink.appendChild(document.createElement("img"));
            img.className = "card-img-top embed-responsive-item";
            img.src = logo_url;
            img.alt = d.name + " logo";
            img.onerror = function() { this.closest(".embed-responsive").style.display = "none"; };

            const body = card.appendChild(document.createElement("div"));
            body.className = "card-body";
            const titleLink = body.appendChild(document.createElement("a"));
            titleLink.href = d.homepage;
            const h5 = titleLink.appendChild(document.createElement("h5"));
            h5.className = "card-title";
            h5.textContent = d.name;
            const desc = body.appendChild(document.createElement("p"));
            desc.className = "card-text";
            desc.textContent = d.description;
            const moreLink = body.appendChild(document.createElement("a"));
            moreLink.href = d.homepage;
            moreLink.className = "card-link";
            moreLink.textContent = "More...";
            const codeLink = body.appendChild(document.createElement("a"));
            codeLink.href = d.html_url;
            codeLink.className = "card-link";
            codeLink.textContent = "Code";

            document.getElementById("project").appendChild(row);
        }).catch(error => console.error("Error loading CSV:", error));
    </script>
</body>
</html>
