<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Table</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>.sortable { cursor: pointer; }</style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body class="container mt-4">
    <h2 class="mb-4">Projects Database</h2>
    <div class="d-flex gap-3 mb-3">
        <div id="published-filter"></div>
        <div id="local-git-filter"></div>
        <div id="github-filter"></div>
    </div>
    <div id="topic-buttons" class="mb-3"></div>
    <table class="table table-striped">
        <thead>
            <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
    
    <script>
        d3.csv("data/projects-db-final.csv").then(function(data) {
            if (data.length === 0) return;
            
            // Filter out rows where my_project is not 'Y'
            data = data.filter(d => d.my_project === "Y");
            
            const columns = ["logo", "name", "description", "date", "links", "topics", "published", "local_git", "github"];
            const tableHead = d3.select("#table-head");
            const tableBody = d3.select("#table-body");
            const topicButtons = d3.select("#topic-buttons");
            let activeTopic = null;
            let activePublished = "all"; // "all" | "Y" | "N"
            let activeLocalGit = "all";
            let activeGithub = "all";
            let sortCol = null;
            let sortAsc = true;

            // Render published filter btn-group
            const publishedGroup = d3.select("#published-filter")
                .append("div").attr("class", "btn-group");

            publishedGroup.selectAll("button")
                .data([{label: "All", value: "all"}, {label: "Published", value: "Y"}, {label: "Not published", value: "N"}])
                .enter()
                .append("button")
                .attr("class", d => d.value === "all" ? "btn btn-primary" : "btn btn-outline-primary")
                .text(d => d.label)
                .on("click", function(event, d) {
                    activePublished = d.value;
                    publishedGroup.selectAll("button")
                        .classed("btn-primary", false)
                        .classed("btn-outline-primary", true);
                    d3.select(this).classed("btn-outline-primary", false).classed("btn-primary", true);
                    updateTable();
                });

            function makeYNGroup(selector, activeVar, label, onChange) {
                const group = d3.select(selector).append("div").attr("class", "btn-group");
                group.selectAll("button")
                    .data([{label: "All", value: "all"}, {label: label, value: "Y"}, {label: "Not " + label.toLowerCase(), value: "N"}])
                    .enter()
                    .append("button")
                    .attr("class", d => d.value === "all" ? "btn btn-primary" : "btn btn-outline-primary")
                    .text(d => d.label)
                    .on("click", function(event, d) {
                        onChange(d.value);
                        group.selectAll("button").classed("btn-primary", false).classed("btn-outline-primary", true);
                        d3.select(this).classed("btn-outline-primary", false).classed("btn-primary", true);
                        updateTable();
                    });
                return group;
            }

            makeYNGroup("#local-git-filter", activeLocalGit, "Local git", v => activeLocalGit = v);
            makeYNGroup("#github-filter", activeGithub, "Github", v => activeGithub = v);

            // Extract unique topics from comma-separated lists, sort them alphabetically
            const topics = Array.from(new Set(data.flatMap(d => d.topics ? d.topics.split(",").map(t => t.trim()) : []))).sort();
            
            // Add buttons for filtering
            topicButtons.selectAll("button")
                .data(topics)
                .enter()
                .append("button")
                .attr("class", "btn btn-outline-primary me-2")
                .text(d => d)
                .on("click", function(event, topic) {
                    if (activeTopic === topic) {
                        activeTopic = null;
                        topicButtons.selectAll("button").classed("btn-primary", false).classed("btn-outline-primary", true);
                    } else {
                        activeTopic = topic;
                        topicButtons.selectAll("button").classed("btn-primary", false).classed("btn-outline-primary", true);
                        d3.select(this).classed("btn-outline-primary", false).classed("btn-primary", true);
                    }
                    updateTable();
                });
            
            // Add table headers with sorting
            tableHead.selectAll("th")
                .data(columns)
                .enter()
                .append("th")
                .text(d => d)
                .attr("class", "sortable")
                .on("click", function(event, d) {
                    if (d === "logo") return;
                    if (sortCol === d) {
                        sortAsc = !sortAsc;
                    } else {
                        sortCol = d;
                        sortAsc = true;
                    }
                    tableHead.selectAll("th").each(function(col) {
                        if (col === "logo") return;
                        if (col === sortCol) {
                            this.textContent = col + (sortAsc ? " ▲" : " ▼");
                        } else {
                            this.textContent = col;
                        }
                    });
                    updateTable();
                });
            
            function updateTable() {
                tableBody.html(""); // Clear existing table rows
                let filteredData = data;
                if (activePublished !== "all") filteredData = filteredData.filter(d => d.published === activePublished);
                if (activeLocalGit !== "all") filteredData = filteredData.filter(d => d.local_git === activeLocalGit);
                if (activeGithub !== "all") filteredData = filteredData.filter(d => d.github === activeGithub);
                if (activeTopic) filteredData = filteredData.filter(d => d.topics && d.topics.split(",").map(t => t.trim()).includes(activeTopic));
                if (sortCol) filteredData = filteredData.slice().sort((a, b) => sortAsc ? d3.ascending(a[sortCol], b[sortCol]) : d3.descending(a[sortCol], b[sortCol]));
                tableBody.selectAll("tr")
                    .data(filteredData)
                    .enter()
                    .append("tr")
                    .each(function(d) {
                        d3.select(this).selectAll("td")
                            .data([
                                d.published === "Y"
                                    ? `<div style="width:40px;height:40px;overflow:hidden"><img src="${d.logo_url || `https://raw.githubusercontent.com/tomwhite/${d.name}/master/logo.png`}" style="width:40px;height:40px;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`
                                    : "",
                                d.homepage ? `<a href="${d.homepage}">${d.name}</a>` : d.name,
                                d.description,
                                d.date,
                                d.html_url ? `<a href="${d.html_url}">Code...</a>` : "",
                                d.topics,
                                d.published,
                                d.local_git,
                                d.github
                            ])
                            .enter()
                            .append("td")
                            .html(d => d);
                    });
            }
            
            updateTable();
        }).catch(error => console.error("Error loading CSV:", error));
    </script>
</body>
</html>
